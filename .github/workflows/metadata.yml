name: App Store Metadata

on:
  workflow_dispatch:

concurrency:
  group: metadata-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  push:
    name: Upload metadata + screenshots to App Store Connect
    runs-on: macos-15
    timeout-minutes: 30

    env:
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
      LC_ALL: en_US.UTF-8
      LANG: en_US.UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Sanity-check required secrets
        run: |
          for var in APP_STORE_CONNECT_API_KEY_ID APP_STORE_CONNECT_API_KEY_ISSUER_ID APP_STORE_CONNECT_API_KEY_CONTENT; do
            if [ -z "${!var}" ]; then
              echo "::error::Required secret $var is not set"
              exit 1
            fi
          done

      - name: Push metadata + screenshots
        run: bundle exec fastlane metadata
