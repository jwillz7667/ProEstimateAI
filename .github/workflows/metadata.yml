name: App Store Metadata

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "What to push"
        required: true
        default: "copy"
        type: choice
        options:
          - copy            # fast: text only, skips screenshots
          - screenshots     # screenshots only
          - all             # text + screenshots (slow, Apple-flaky)

concurrency:
  group: metadata-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  push:
    name: Upload metadata to App Store Connect
    runs-on: macos-15
    timeout-minutes: 60

    env:
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
      LC_ALL: en_US.UTF-8
      LANG: en_US.UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Sanity-check required secrets
        run: |
          for var in APP_STORE_CONNECT_API_KEY_ID APP_STORE_CONNECT_API_KEY_ISSUER_ID APP_STORE_CONNECT_API_KEY_CONTENT; do
            if [ -z "${!var}" ]; then
              echo "::error::Required secret $var is not set"
              exit 1
            fi
          done

      - name: Pick lane
        id: lane
        run: |
          case "${{ inputs.scope }}" in
            copy)        echo "name=metadata_copy" >> "$GITHUB_OUTPUT" ;;
            screenshots) echo "name=metadata_screenshots" >> "$GITHUB_OUTPUT" ;;
            all)         echo "name=metadata" >> "$GITHUB_OUTPUT" ;;
            *)           echo "::error::Unknown scope ${{ inputs.scope }}"; exit 1 ;;
          esac

      - name: Run ${{ steps.lane.outputs.name }} lane
        run: bundle exec fastlane ${{ steps.lane.outputs.name }}
