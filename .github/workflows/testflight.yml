name: TestFlight

on:
  # Tag a release (vX.Y.Z) to ship a build to TestFlight. Can also be
  # triggered manually from the Actions tab for one-off uploads.
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  upload:
    name: Archive and push to TestFlight
    runs-on: macos-15
    timeout-minutes: 60

    env:
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
      DIST_CERT_P12_BASE64: ${{ secrets.DIST_CERT_P12_BASE64 }}
      DIST_CERT_P12_PASSWORD: ${{ secrets.DIST_CERT_P12_PASSWORD }}
      FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: "120"
      LC_ALL: en_US.UTF-8
      LANG: en_US.UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: |
          ls /Applications | grep -i Xcode
          # Pick the highest available Xcode 26.x. The macos-15 image
          # carries 26.0 → 26.3 today; pinning to a specific minor
          # (26.4) caused us to silently fall through to Xcode 16.4 and
          # archive against the iOS 18 SDK, which fails on iOS 26 APIs
          # like MapContentBuilder. `sort -V` puts 26.3.0 above 26.3
          # above 26.2.0… and `tail -1` picks the newest.
          xc=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$xc" ]; then
            echo "::error::No Xcode 26.x found on runner — only have:"
            ls /Applications | grep -i Xcode
            exit 1
          fi
          echo "Selecting $xc"
          sudo xcode-select -s "$xc"
          xcode-select -p
          xcodebuild -version

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Sanity-check required secrets
        run: |
          for var in APP_STORE_CONNECT_API_KEY_ID APP_STORE_CONNECT_API_KEY_ISSUER_ID APP_STORE_CONNECT_API_KEY_CONTENT DIST_CERT_P12_BASE64 DIST_CERT_P12_PASSWORD; do
            if [ -z "${!var}" ]; then
              echo "::error::Required secret $var is not set"
              exit 1
            fi
          done

      - name: Materialize API key file for xcodebuild code-signing
        id: api_key_file
        run: |
          dir="$RUNNER_TEMP/appstoreconnect"
          mkdir -p "$dir"
          path="$dir/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          # Auto-detect whether the secret is raw PEM or base64.
          # xcodebuild needs the file to contain actual PEM text.
          if printf '%s' "$APP_STORE_CONNECT_API_KEY_CONTENT" | grep -q 'BEGIN PRIVATE KEY'; then
            printf '%s' "$APP_STORE_CONNECT_API_KEY_CONTENT" > "$path"
          else
            printf '%s' "$APP_STORE_CONNECT_API_KEY_CONTENT" | base64 --decode > "$path"
          fi
          chmod 600 "$path"
          echo "path=$path" >> "$GITHUB_OUTPUT"

      - name: Run beta lane
        env:
          APP_STORE_CONNECT_API_KEY_PATH: ${{ steps.api_key_file.outputs.path }}
        run: bundle exec fastlane beta

      - name: Upload ipa as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ProEstimateAI-ipa
          path: "*.ipa"
          if-no-files-found: ignore
          retention-days: 7
