name: TestFlight

on:
  # Tag a release (vX.Y.Z) to ship a build to TestFlight. Can also be
  # triggered manually from the Actions tab for one-off uploads.
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  upload:
    name: Archive and push to TestFlight
    runs-on: macos-15
    timeout-minutes: 60

    env:
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
      FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: "120"
      LC_ALL: en_US.UTF-8
      LANG: en_US.UTF-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: |
          ls /Applications | grep -i Xcode
          if [ -d "/Applications/Xcode_26.4.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.4.app
          elif [ -d "/Applications/Xcode_26.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.app
          fi
          xcode-select -p
          xcodebuild -version

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Sanity-check required secrets
        run: |
          for var in APP_STORE_CONNECT_API_KEY_ID APP_STORE_CONNECT_API_KEY_ISSUER_ID APP_STORE_CONNECT_API_KEY_CONTENT; do
            if [ -z "${!var}" ]; then
              echo "::error::Required secret $var is not set"
              exit 1
            fi
          done

      - name: Run beta lane
        run: bundle exec fastlane beta

      - name: Upload ipa as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ProEstimateAI-ipa
          path: "*.ipa"
          if-no-files-found: ignore
          retention-days: 7
